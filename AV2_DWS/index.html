    <main>
        <section>
            <h2>Cadastro de Preferências</h2>
            <form id="form-cadastro">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" maxlength="100" required>

                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" maxlength="20" required>

                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" maxlength="150" required>

                <label for="estilo">Estilo musical favorito:</label>
                <input type="text" id="estilo" name="estilo" maxlength="150" required>

                <label for="musica">Música favorita:</label>
                <input type="text" id="musica" name="musica" maxlength="150" required>

                <label for="cantor">Cantor favorito:</label>
                <input type="text" id="cantor" name="cantor" maxlength="150" required>

                <button type="submit" id="butao">Enviar Dados</button>
            </form>
        </section>

        <section>
            <h2>Você quer alterar seus dados?</h2>
            <form id="form-verificacao">
                <label for="alt-email">E-mail de Cadastro:</label>
                <input type="email" id="alt-email" name="alt_email" required>

                <label for="alt-senha">Senha:</label>
                <input type="password" id="alt-senha" name="alt_senha" required>

                <button type="submit" id="butaoVerificar">Verificar e Alterar</button>
            </form>
        </section>
